name: build-test-containers
on:
  workflow_dispatch:
  schedule:
  - cron: 11 2 13 * *
jobs:
  base:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - run:
        docker build
          -f Dockerfile.test
          --target ruby-build
          -t ghcr.io/toy/image_optim.test:ruby-build
          --push
          .

  test-images:
    needs: base
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby:
        - '1.9'
        - '2.0'
        - '2.1'
        - '2.2'
        - '2.3'
        - '2.4'
        - '2.5'
        - '2.6'
        - '2.7'
        - '3.0'
        - '3.1'
        - '3.2'
        - '3.3'
        - '3.4'
        - '4.0'
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - run:
        docker build
          -f Dockerfile.test
          --target test
          --build-arg "RUBY_VERSION=${{ matrix.ruby }}"
          -t "ghcr.io/toy/image_optim.test:${{ matrix.ruby }}"
          --push
          .
